# ============================================================================
# TERMINAL & DISPLAY
# ============================================================================

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:RGB"

set -g history-limit 50000000
set -s escape-time 0
set -g repeat-time 2000
set -g display-time 1500

# ============================================================================
# GENERAL
# ============================================================================

set -g default-shell /usr/bin/zsh
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on
set -g set-clipboard on
set-window-option -g mode-keys vi

# ============================================================================
# PREFIX
# ============================================================================

set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix

# ============================================================================
# KEY BINDINGS
# ============================================================================

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display-message "config reloaded"

# Splits
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Kill pane without confirm
unbind x
bind x kill-pane

# Window navigation
bind TAB last-window
bind -r H previous-window
bind -r L next-window

# Swap windows
bind -r u run 'tmux swap-window -d -t #{e|-|:#I,1}'
bind -r i run 'tmux swap-window -d -t #{e|+|:#I,1}'

# Pane navigation (with prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane navigation (without prefix)
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-j select-pane -D
bind -n M-k select-pane -U

# Pane resize
bind -r Left  resize-pane -L 5
bind -r Down  resize-pane -D 5
bind -r Up    resize-pane -U 5
bind -r Right resize-pane -R 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5

# Zoom pane
bind -r m resize-pane -Z

# Window chooser (current session)
unbind w
bind w run-shell "tmux choose-tree -Zf '##{==:##{session_name},#{session_name}}'"
bind W choose-tree -Z

# Find session
bind C-f command-prompt -p find-session 'switch-client -t %%'

# Clear screen + history
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# Search
unbind "/"
bind "/" copy-mode \; send-keys '?'

# ============================================================================
# COPY MODE (vi)
# ============================================================================

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection
bind -T copy-mode-vi Escape send -X cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# ============================================================================
# STATUS BAR
# ============================================================================

set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 40
set -g status-right-length 60

# Colors
bg="#0d1117"
fg="#c9d1d9"
subtle="#30363d"
blue="#58a6ff"
green="#3fb950"
yellow="#d29922"
muted="#8b949e"

set -g status-style                  "bg=#0d1117,fg=#c9d1d9"
set -g pane-border-style             "fg=#30363d"
set -g pane-active-border-style      "fg=#58a6ff"
set -g mode-style                    "bg=#58a6ff,fg=#0d1117"
set -g message-style                 "bg=#161b22,fg=#c9d1d9"

# Left: prefix indicator + session name
# Dot turns yellow when prefix is active
set -g status-left "#{?client_prefix,#[fg=#d29922 bold],#[fg=#3fb950 bold]} ●  #[fg=#c9d1d9 bold]#S  "

# Right: time + date
set -g status-right "#[fg=#8b949e] %H:%M    %Y-%m-%d "

# Window list
setw -g window-status-style          "fg=#8b949e,bg=#0d1117"
setw -g window-status-current-style  "fg=#58a6ff bold,bg=#0d1117"
setw -g window-status-format         " #I:#W#{?window_zoomed_flag, 󰊓,} "
setw -g window-status-current-format " #I:#W#{?window_zoomed_flag, 󰊓,} "
setw -g window-status-separator      ""
