---
- name: Ensure dotfiles repo root exists
  ansible.builtin.file:
    path: "{{ dotfiles_repo_root }}"
    state: directory
    mode: "0755"
  tags: [dotfiles]

- name: Sync dotfiles directory to remote machine
  ansible.posix.synchronize:
    src: "{{ dotfiles_source }}"
    dest: "{{ dotfiles_dest }}"
    delete: true
    recursive: true
  tags: [dotfiles]

- name: Run dotbot install to create symlinks
  ansible.builtin.command:
    cmd: ./install
    chdir: "{{ dotfiles_dest }}"
  register: dotbot_output
  changed_when: "'All tasks executed successfully' in dotbot_output.stdout"
  tags: [dotfiles]

- name: Display dotbot output
  ansible.builtin.debug:
    var: dotbot_output.stdout_lines
  tags: [dotfiles]
