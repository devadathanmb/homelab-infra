---
- name: Ensure SSH directory exists
  ansible.builtin.file:
    path: "{{ git_ssh_dir }}"
    state: directory
    mode: "0700"
  tags: [git, ssh]

- name: Set global Git configuration
  community.general.git_config:
    name: "{{ item.name }}"
    scope: global
    value: "{{ item.value }}"
  loop: "{{ git_global_config }}"
  tags: [git]

- name: Set Git user name
  community.general.git_config:
    name: user.name
    scope: global
    value: "{{ git_user_name }}"
  when: git_user_name | length > 0
  tags: [git]

- name: Set Git user email
  community.general.git_config:
    name: user.email
    scope: global
    value: "{{ git_user_email }}"
  when: git_user_email | length > 0
  tags: [git]

- name: Ensure Git SSH key exists when enabled
  ansible.builtin.command:
    cmd: >-
      ssh-keygen -q -t ed25519
      -C "{{ git_ssh_key_comment }}"
      -f "{{ git_ssh_key_path }}"
      -N ""
  args:
    creates: "{{ git_ssh_key_path }}"
  when: git_ssh_generate_key
  register: git_ssh_keygen_result
  tags: [git, ssh]

- name: Ensure SSH config exists
  ansible.builtin.template:
    src: ssh_config.j2
    dest: "{{ git_ssh_config_path }}"
    mode: "0600"
  tags: [git, ssh]

- name: Trust pinned Git host keys
  ansible.builtin.known_hosts:
    path: "{{ git_ssh_known_hosts_path }}"
    name: "{{ item.name }}"
    key: "{{ item.key }}"
    state: present
  loop: "{{ git_known_hosts }}"
  tags: [git, ssh]

- name: Check whether a Git SSH public key exists
  ansible.builtin.stat:
    path: "{{ git_ssh_key_path }}.pub"
  register: git_ssh_public_key_stat
  tags: [git, ssh]

- name: Read Git SSH public key
  ansible.builtin.slurp:
    src: "{{ git_ssh_key_path }}.pub"
  register: git_ssh_public_key
  when: git_ssh_public_key_stat.stat.exists
  tags: [git, ssh]

- name: Display Git SSH public key when newly generated
  ansible.builtin.debug:
    msg: "{{ git_ssh_public_key.content | b64decode | trim }}"
  when:
    - git_ssh_public_key_stat.stat.exists
    - git_ssh_generate_key
    - git_ssh_keygen_result is defined
    - git_ssh_keygen_result.changed
  tags: [git, ssh]
