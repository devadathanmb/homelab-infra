---
- name: Get remote user home directory
  ansible.builtin.getent:
    database: passwd
    key: "{{ ansible_user }}"
  tags: [git, ssh]

- name: Set SSH path facts
  ansible.builtin.set_fact:
    _git_home: "{{ ansible_facts.getent_passwd[ansible_user][4] }}"
    _git_ssh_dir: "{{ ansible_facts.getent_passwd[ansible_user][4] }}/.ssh"
    _git_ssh_key_path: "{{ ansible_facts.getent_passwd[ansible_user][4] }}/.ssh/{{ git_ssh_key_name }}"
  tags: [git, ssh]

- name: Ensure SSH directory exists
  ansible.builtin.file:
    path: "{{ _git_ssh_dir }}"
    state: directory
    mode: "0700"
  tags: [git, ssh]

- name: Ensure Git SSH key exists when enabled
  ansible.builtin.command:
    cmd: >-
      ssh-keygen -q -t ed25519
      -C "{{ ansible_user }}@{{ inventory_hostname }}"
      -f "{{ _git_ssh_key_path }}"
      -N ""
  args:
    creates: "{{ _git_ssh_key_path }}"
  when: git_ssh_generate_key
  register: git_ssh_keygen_result
  tags: [git, ssh]

- name: Ensure SSH config exists
  ansible.builtin.template:
    src: ssh_config.j2
    dest: "{{ _git_ssh_dir }}/config"
    mode: "0600"
  tags: [git, ssh]

- name: Trust pinned Git host keys
  ansible.builtin.known_hosts:
    path: "{{ _git_ssh_dir }}/known_hosts"
    name: "{{ item.name }}"
    key: "{{ item.key }}"
    state: present
  loop: "{{ git_known_hosts }}"
  tags: [git, ssh]

- name: Check whether a Git SSH public key exists
  ansible.builtin.stat:
    path: "{{ _git_ssh_key_path }}.pub"
  register: git_ssh_public_key_stat
  tags: [git, ssh]

- name: Read Git SSH public key
  ansible.builtin.slurp:
    src: "{{ _git_ssh_key_path }}.pub"
  register: git_ssh_public_key
  when: git_ssh_public_key_stat.stat.exists
  tags: [git, ssh]

- name: Display Git SSH public key when newly generated
  ansible.builtin.debug:
    msg: "{{ git_ssh_public_key.content | b64decode | trim }}"
  when:
    - git_ssh_public_key_stat.stat.exists
    - git_ssh_generate_key
    - git_ssh_keygen_result is defined
    - git_ssh_keygen_result.changed
  tags: [git, ssh]
