---
- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"
  tags: [system]

- name: Ensure locale exists
  ansible.builtin.lineinfile:
    path: /etc/locale.gen
    regexp: '^#?{{ locale_gen_entry | regex_escape() }}$'
    line: "{{ locale_gen_entry }}"
  register: locale_gen_entry_result
  tags: [system]

- name: Generate locale
  ansible.builtin.command: locale-gen
  when: locale_gen_entry_result.changed
  changed_when: locale_gen_entry_result.changed
  tags: [system]

- name: Set default system locale
  ansible.builtin.lineinfile:
    path: /etc/default/locale
    regexp: '^LANG='
    line: "LANG={{ locale }}"
    create: true
    mode: "0644"
  tags: [system]

- name: Install system packages
  ansible.builtin.apt:
    name: "{{ system_packages }}"
    state: present
  tags: [system]

- name: Enable cgroup memory limits in kernel cmdline
  ansible.builtin.replace:
    path: "{{ cmdline_txt_path }}"
    regexp: '^((?!.*cgroup_memory=1)(?!.*cgroup_enable=memory).*)$'
    replace: '\1 cgroup_memory=1 cgroup_enable=memory'
  register: cmdline_result
  tags: [system]

- name: Reboot to apply cgroup changes
  ansible.builtin.reboot:
    reboot_timeout: 120
  when: cmdline_result.changed
  tags: [system]
