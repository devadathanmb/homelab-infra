---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: "{{ apt_cache_valid_time }}"
  tags: [packages]

- name: Upgrade installed packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true
  tags: [packages]

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
  tags: [packages]

- name: Check whether a reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file
  tags: [packages]

- name: Report reboot status
  ansible.builtin.debug:
    msg: "Reboot is required before continuing with later playbooks."
  when: reboot_required_file.stat.exists
  tags: [packages]
