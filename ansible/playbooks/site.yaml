---
- name: Install base packages
  ansible.builtin.import_playbook: packages.yaml

- name: Apply base system configuration
  ansible.builtin.import_playbook: system.yaml

- name: Install Docker runtime
  ansible.builtin.import_playbook: docker.yaml

- name: Configure Git and SSH access
  ansible.builtin.import_playbook: git.yaml

- name: Deploy dotfiles
  ansible.builtin.import_playbook: dotfiles.yaml
